<div class="description-container">
    <form class="description-form">
      <div class="form-group">
        <label for="description">Description:</label>
        <input type="text" id="description" placeholder="Enter description">
      </div>
  
      <div class="form-group">
        <label for="video">Upload preview video:</label>
        <p class="hint-text">*2 min minimum per video</p>
        <input type="file" id="video" accept="video/*">
      </div>
  
      <div class="video-preview">
        <img src="https://images.app.goo.gl/DLPRGq7Mmkxqocwa7" alt="Lettuce preview image">
      </div>
  
      <button class="finish-button" type="button">Finish</button>
    </form>
  </div>
